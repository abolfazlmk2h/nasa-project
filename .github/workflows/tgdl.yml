name: 01- 📲 Telegram File Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram post/file link'
        required: true
        type: string
      password:
        description: '🔐 Password for archive (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ Setup git & dependencies
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          MISSING=""
          command -v aria2c >/dev/null 2>&1 || MISSING="$MISSING aria2"
          command -v 7z     >/dev/null 2>&1 || MISSING="$MISSING p7zip-full"
          if [ -n "$MISSING" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y $MISSING
          fi

          pip install -q yt-dlp --break-system-packages

          echo "✅ Ready"
          aria2c --version | head -1
          yt-dlp --version

      - name: ⬇️ Download
        id: download
        run: |
          TELEGRAM_LINK="${{ github.event.inputs.telegram_link }}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "🔗 Link: $TELEGRAM_LINK"
          echo "═══════════════════════════════════════════════════════════════"

          BACKUP_DIR="/tmp/tg_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          mkdir -p tmp_downloads

          DOWNLOAD_OK=false

          echo "🔄 Attempt 1 — yt-dlp..."
          if yt-dlp \
              --no-warnings \
              --output "tmp_downloads/%(title)s.%(ext)s" \
              --merge-output-format mp4 \
              --no-playlist \
              "$TELEGRAM_LINK" 2>&1; then
            DOWNLOAD_OK=true
            echo "✅ yt-dlp succeeded"
          else
            echo "⚠️  yt-dlp failed, trying CDN scrape..."
          fi

          if [ "$DOWNLOAD_OK" = false ]; then
            echo "🔄 Attempt 2 — CDN scrape..."

            PAGE_HTML=$(curl -sL --max-time 20 \
              -H "User-Agent: TelegramBot (like TwitterBot)" \
              "$TELEGRAM_LINK" 2>/dev/null || echo "")

            RAW_URL=""

            VIDEO_URL=$(echo "$PAGE_HTML" | grep -oP '(?<=content=")[^"]+\.(mp4|mov|avi|mkv)[^"]*' | head -1 || echo "")
            [ -n "$VIDEO_URL" ] && RAW_URL="$VIDEO_URL" && echo "✅ Found video via og:video"

            if [ -z "$RAW_URL" ]; then
              AUDIO_URL=$(echo "$PAGE_HTML" | grep -oP '(?<=content=")[^"]+\.(mp3|m4a|ogg|flac|wav)[^"]*' | head -1 || echo "")
              [ -n "$AUDIO_URL" ] && RAW_URL="$AUDIO_URL" && echo "✅ Found audio URL"
            fi

            if [ -z "$RAW_URL" ]; then
              DOC_URL=$(echo "$PAGE_HTML" | grep -oP '(?<=content=")[^"]+\.(pdf|zip|rar|7z)[^"]*' | head -1 || echo "")
              [ -n "$DOC_URL" ] && RAW_URL="$DOC_URL" && echo "✅ Found document URL"
            fi

            if [ -z "$RAW_URL" ]; then
              CDN_URLS=$(echo "$PAGE_HTML" | grep -oP 'https://cdn[0-9]*\.telesco\.pe/file/[^"]+' || echo "")
              while IFS= read -r CANDIDATE; do
                [ -z "$CANDIDATE" ] && continue
                CT=$(curl -sI --max-time 10 \
                  -H "User-Agent: Mozilla/5.0" \
                  -H "Referer: https://t.me/" \
                  "$CANDIDATE" 2>/dev/null | grep -i "content-type:" | head -1 | tr -d '\r')
                if echo "$CT" | grep -qiE "video|audio|octet-stream|zip|pdf|rar|7z"; then
                  RAW_URL="$CANDIDATE"
                  echo "✅ Found non-image CDN URL"
                  break
                else
                  echo "⚠️  Skipping thumbnail CDN URL"
                fi
              done <<< "$CDN_URLS"
            fi

            if [ -n "$RAW_URL" ] && [ "$RAW_URL" != "null" ]; then
              CONTENT_TYPE=$(curl -sI --max-time 10 \
                -H "User-Agent: Mozilla/5.0" \
                -H "Referer: https://t.me/" \
                "$RAW_URL" 2>/dev/null | grep -i "content-type:" | head -1 | tr -d '\r')

              EXT=$(python3 -c "import sys; ct=sys.argv[1].lower(); m={'video/mp4':'mp4','video/webm':'webm','video/x-matroska':'mkv','video/quicktime':'mov','audio/mpeg':'mp3','audio/mp4':'m4a','audio/ogg':'ogg','audio/flac':'flac','audio/wav':'wav','image/jpeg':'jpg','image/png':'png','image/gif':'gif','image/webp':'webp','application/pdf':'pdf','application/zip':'zip','application/x-7z-compressed':'7z','application/x-rar-compressed':'rar'}; [(__import__('sys').stdout.write(v+'\n'),exit()) for k,v in m.items() if k in ct]; print('bin')" "$CONTENT_TYPE")

              FINAL_NAME="telegram_$(date +%s).${EXT}"

              ENCODED_URL=$(python3 -c "import sys,urllib.parse; url=sys.argv[1]; has_q='?' in url; has_h='#' in url; p,r=(url.split('?',1) if has_q else (url.split('#',1) if has_h else (url,''))); r=('?'+r if has_q else ('#'+r if has_h else '')); print(urllib.parse.quote(p,safe=':/@.-_~!\$&()*+,;=')+r)" "$RAW_URL")

              echo "🔗 URL: $ENCODED_URL"
              echo "📄 File: $FINAL_NAME"

              if aria2c \
                  --out="$FINAL_NAME" \
                  --dir="tmp_downloads" \
                  --split=16 \
                  --max-connection-per-server=16 \
                  --min-split-size=2M \
                  --max-tries=5 \
                  --retry-wait=5 \
                  --timeout=60 \
                  --connect-timeout=30 \
                  --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  --header="Referer: https://t.me/" \
                  --allow-overwrite=true \
                  --auto-file-renaming=false \
                  "$ENCODED_URL"; then
                DOWNLOAD_OK=true
              else
                rm -f "tmp_downloads/$FINAL_NAME"
                echo "⚠️  aria2c failed, trying curl..."
                if curl -L --progress-bar --max-time 7200 --retry 5 --retry-delay 10 \
                    --http1.1 \
                    -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                    -H "Referer: https://t.me/" \
                    -o "tmp_downloads/$FINAL_NAME" \
                    "$ENCODED_URL"; then
                  DOWNLOAD_OK=true
                else
                  rm -f "tmp_downloads/$FINAL_NAME"
                  echo "⚠️  curl failed, trying wget..."
                  if wget -q --show-progress \
                        --timeout=7200 --tries=5 \
                        --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                        --referer="https://t.me/" \
                        -O "tmp_downloads/$FINAL_NAME" \
                        "$ENCODED_URL"; then
                    DOWNLOAD_OK=true
                  fi
                fi
              fi
            fi
          fi

          if [ "$DOWNLOAD_OK" = false ]; then
            echo "❌ All download methods failed"
            exit 1
          fi

          FINAL_FILE=$(find tmp_downloads -type f | head -1)
          FINAL_NAME=$(basename "$FINAL_FILE")

          SIZE=$(stat -c%s "tmp_downloads/$FINAL_NAME")
          if [ "$SIZE" -lt 1024 ]; then
            echo "❌ File too small (${SIZE} bytes) — likely an error page"
            head -5 "tmp_downloads/$FINAL_NAME"
            exit 1
          fi

          SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
          echo ""
          echo "✅ Download complete!"
          echo "   📄 File : $FINAL_NAME"
          echo "   💾 Size : ${SIZE_MB} MB"

          echo "file_size=$SIZE"             >> $GITHUB_OUTPUT
          echo "file_size_mb=$SIZE_MB"       >> $GITHUB_OUTPUT
          echo "downloaded_name=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: 📦 Package & organise
        run: |
          FILENAME="${{ steps.download.outputs.downloaded_name }}"
          FILE_SIZE="${{ steps.download.outputs.file_size }}"
          FILE_SIZE_MB="${{ steps.download.outputs.file_size_mb }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          TELEGRAM_LINK="${{ github.event.inputs.telegram_link }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          FILE_SIZE_MB_INT=$(echo "$FILE_SIZE_MB" | cut -d'.' -f1)

          if   [ "$FILE_SIZE_MB_INT" -lt 45 ];   then SPLIT_MB=0
          elif [ "$FILE_SIZE_MB_INT" -lt 500 ];  then SPLIT_MB=45
          elif [ "$FILE_SIZE_MB_INT" -lt 2048 ]; then SPLIT_MB=90
          else SPLIT_MB=190
          fi

          SPLIT_LIMIT=$(( SPLIT_MB * 1024 * 1024 ))

          echo "═══════════════════════════════════════════════════════════════"
          echo "📊 File: ${FILE_SIZE_MB} MB — Split: ${SPLIT_MB} MB parts"
          echo "═══════════════════════════════════════════════════════════════"

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta"
                        "kappa" "lambda" "sigma" "omega" "nova" "star" "moon"
                        "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_unique_folder() {
            local BASE_PATH="$1" NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"; return
            fi
            local RAND="${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
            while [ -d "$BASE_PATH/${NAME}_${RAND}" ] || [ -d "$BACKUP_DIR/${NAME}_${RAND}" ]; do
              RAND="${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
            done
            echo "${NAME}_${RAND}"
          }

          FILENAME_NO_EXT="${FILENAME%.*}"
          EXT="${FILENAME##*.}"
          [ "$EXT" = "$FILENAME" ] && EXT="bin"

          FINAL_FOLDER=$(get_unique_folder "downloads" "$FILENAME_NO_EXT")
          FOLDER_DIR="$BACKUP_DIR/$FINAL_FOLDER"
          mkdir -p "$FOLDER_DIR"
          FOLDER_ENCODED=$(urlencode "$FINAL_FOLDER")

          echo "📁 Folder: $FINAL_FOLDER"

          if [ "$SPLIT_MB" -gt 0 ] && [ "$FILE_SIZE" -gt "$SPLIT_LIMIT" ]; then
            echo "✂️  Splitting into ${SPLIT_MB} MB parts..."
            ARCHIVE_BASE="$FOLDER_DIR/$FINAL_FOLDER"
            if [ -n "$ZIP_PASSWORD" ]; then
              7z a -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mhe=on -mx=0 "${ARCHIVE_BASE}.7z" "tmp_downloads/$FILENAME"
            else
              7z a -v${SPLIT_MB}m -mx=0 "${ARCHIVE_BASE}.7z" "tmp_downloads/$FILENAME"
            fi

            PART_COUNT=$(ls "$FOLDER_DIR/"*.7z* 2>/dev/null | wc -l)
            TOTAL_ARC_SIZE=0
            for pf in "$FOLDER_DIR"/*; do
              [ -f "$pf" ] || continue
              TOTAL_ARC_SIZE=$(( TOTAL_ARC_SIZE + $(stat -c%s "$pf") ))
            done
            TOTAL_ARC_MB=$(echo "scale=2; $TOTAL_ARC_SIZE / 1024 / 1024" | bc)

            DOWNLOAD_LINKS_MD=""
            LINK_NUM=0
            for pf in $(ls "$FOLDER_DIR/"*.7z* 2>/dev/null | sort); do
              [ -f "$pf" ] || continue
              PB=$(basename "$pf")
              PE=$(urlencode "$PB")
              RAW="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PE}"
              LINK_NUM=$(( LINK_NUM + 1 ))
              DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PB}\` | [⬇️ Download](${RAW}) |"$'\n'
            done

            {
              printf '# %s\n\n---\n\n## 📋 File Information\n\n' "$FINAL_FOLDER"
              printf '| Property | Value |\n|----------|-------|\n'
              printf '| **File Name** | `%s` |\n' "$FILENAME_NO_EXT"
              printf '| **Source Link** | [Telegram Post](%s) |\n' "$TELEGRAM_LINK"
              printf '| **Original Size** | **%s MB** |\n' "$FILE_SIZE_MB"
              printf '| **Archive** | **%s parts — %s MB total** |\n' "$PART_COUNT" "$TOTAL_ARC_MB"
              printf '| **Part Size** | **%s MB per part** |\n' "$SPLIT_MB"
              printf '| **Status** | ✅ Complete |\n'
              [ -n "$ZIP_PASSWORD" ] && printf '| **Password Protected** | 🔐 **YES** |\n' || printf '| **Password Protected** | **NO** |\n'
              printf '\n---\n\n## ⬇️ Download Links\n\n| # | File | Link |\n|---|------|------|\n'
              printf '%s' "$DOWNLOAD_LINKS_MD"
              printf '\n---\n\n## 📖 How to Extract\n\n'
              printf '1. Download all parts\n2. Install [7-Zip](https://www.7-zip.org/) or [Keka](https://www.keka.io/)\n'
              printf '3. Right-click `.7z.001` → Extract Here\n'
              [ -n "$ZIP_PASSWORD" ] && printf '4. Enter the password when prompted\n'
              printf '\n---\n\n*Downloaded via GitHub Actions Telegram Downloader*\n'
            } > "$FOLDER_DIR/README.md"

          elif [ -n "$ZIP_PASSWORD" ]; then
            echo "🔐 Creating password-protected archive..."
            7z a -p"${ZIP_PASSWORD}" -mhe=on -mx=0 "$FOLDER_DIR/${FINAL_FOLDER}.7z" "tmp_downloads/$FILENAME"

            ARC_SIZE=$(stat -c%s "$FOLDER_DIR/${FINAL_FOLDER}.7z" 2>/dev/null || echo 0)
            ARC_MB=$(echo "scale=2; $ARC_SIZE / 1024 / 1024" | bc)
            FILE_ENC=$(urlencode "${FINAL_FOLDER}.7z")
            RAW="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENC}"

            {
              printf '# %s\n\n---\n\n## 📋 File Information\n\n' "$FINAL_FOLDER"
              printf '| Property | Value |\n|----------|-------|\n'
              printf '| **File Name** | `%s` |\n' "$FILENAME_NO_EXT"
              printf '| **Source Link** | [Telegram Post](%s) |\n' "$TELEGRAM_LINK"
              printf '| **Original Size** | **%s MB** |\n' "$FILE_SIZE_MB"
              printf '| **Archive Size** | **%s MB** |\n' "$ARC_MB"
              printf '| **Status** | ✅ Complete |\n'
              printf '| **Password Protected** | 🔐 **YES** |\n'
              printf '\n---\n\n## ⬇️ Download Link\n\n| # | File | Link |\n|---|------|------|\n'
              printf '| 1 | `%s.7z` | [⬇️ Download](%s) |\n' "$FINAL_FOLDER" "$RAW"
              printf '\n---\n\n## 📖 How to Extract\n\n'
              printf '1. Install [7-Zip](https://www.7-zip.org/) or [Keka](https://www.keka.io/)\n'
              printf '2. Right-click the `.7z` file → Extract Here\n'
              printf '3. Enter the password when prompted\n'
              printf '\n---\n\n*Downloaded via GitHub Actions Telegram Downloader*\n'
            } > "$FOLDER_DIR/README.md"

          else
            echo "📄 Storing file directly..."
            cp "tmp_downloads/$FILENAME" "$FOLDER_DIR/${FINAL_FOLDER}.${EXT}"

            FILE_ENC=$(urlencode "${FINAL_FOLDER}.${EXT}")
            RAW="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENC}"

            {
              printf '# %s\n\n---\n\n## 📋 File Information\n\n' "$FINAL_FOLDER"
              printf '| Property | Value |\n|----------|-------|\n'
              printf '| **File Name** | `%s` |\n' "$FILENAME_NO_EXT"
              printf '| **Source Link** | [Telegram Post](%s) |\n' "$TELEGRAM_LINK"
              printf '| **Size** | **%s MB** |\n' "$FILE_SIZE_MB"
              printf '| **Status** | ✅ Complete |\n'
              printf '| **Password Protected** | **NO** |\n'
              printf '\n---\n\n## ⬇️ Download Link\n\n| # | File | Link |\n|---|------|------|\n'
              printf '| 1 | `%s.%s` | [⬇️ Download](%s) |\n' "$FINAL_FOLDER" "$EXT" "$RAW"
              printf '\n---\n\nReady to use — no extraction needed!\n'
              printf '\n---\n\n*Downloaded via GitHub Actions Telegram Downloader*\n'
            } > "$FOLDER_DIR/README.md"
          fi

          rm -rf tmp_downloads

          echo ""
          echo "✅ Package ready:"
          find "$FOLDER_DIR" -type f | sort

          echo "folder_name=$FINAL_FOLDER" >> $GITHUB_ENV

      - name: 📤 Commit & push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          regenerate_master_readme() {
            mkdir -p downloads
            {
              printf '# 📲 Telegram Downloaded Files\n\n---\n\n'
            } > "downloads/README.md"

            FILE_EMOJIS=("📁" "📂" "🗂️" "📦" "🗃️" "💾" "📎" "🔗" "📋" "🗄️"
                         "🎬" "🎥" "🎵" "🎶" "📸" "🖼️" "📄" "📑" "📃" "🗒️")
            NUM=0
            for folder in downloads/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              NUM=$(( NUM + 1 ))
              EMOJI="${FILE_EMOJIS[$RANDOM % ${#FILE_EMOJIS[@]}]}"
              FENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME")
              LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/downloads/${FENC}"
              printf -- '- %d %s [%s](%s)\n' "$NUM" "$EMOJI" "$FOLDER_NAME" "$LINK" >> "downloads/README.md"
            done

            printf '\n---\n\n*Auto-generated by GitHub Actions Telegram Downloader*\n' >> "downloads/README.md"
            echo "📋 Master README updated — $NUM folder(s)"
          }

          push_batch() {
            local BATCH_SIZE=3 FILES=("$@") BATCH_COUNT=0 BATCH_FILES=()
            local TOTAL_PUSHED=0 TOTAL_FILES=${#FILES[@]}

            for FILE in "${FILES[@]}"; do
              BATCH_FILES+=("$FILE")
              BATCH_COUNT=$(( BATCH_COUNT + 1 ))

              if [ $BATCH_COUNT -ge $BATCH_SIZE ]; then
                TOTAL_PUSHED=$(( TOTAL_PUSHED + BATCH_COUNT ))
                echo ">>> 📦 Pushing batch ($TOTAL_PUSHED / $TOTAL_FILES)..."
                git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                git reset --hard origin/"$BRANCH" 2>/dev/null || true
                mkdir -p downloads
                cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done
                if ! git diff --cached --quiet 2>/dev/null; then
                  git commit -m "📲 Add batch [skip ci]" --quiet 2>/dev/null || true
                  local PR=0
                  while [ $PR -lt 5 ]; do
                    PR=$(( PR + 1 ))
                    if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                      echo "    ✅ Pushed!"; break
                    else
                      echo "    ⚠️  Retry $PR/5..."
                      sleep $(( 3 + RANDOM % 7 ))
                      git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                      git reset --hard origin/"$BRANCH" 2>/dev/null || true
                      mkdir -p downloads
                      cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                      for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done
                      if ! git diff --cached --quiet 2>/dev/null; then
                        git commit -m "📲 Add batch [skip ci]" --quiet 2>/dev/null || true
                      fi
                    fi
                  done
                fi
                BATCH_FILES=(); BATCH_COUNT=0; sleep 2
              fi
            done

            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              TOTAL_PUSHED=$(( TOTAL_PUSHED + ${#BATCH_FILES[@]} ))
              echo ">>> 📦 Pushing final batch ($TOTAL_PUSHED / $TOTAL_FILES)..."
              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              mkdir -p downloads
              cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
              for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done
              if ! git diff --cached --quiet 2>/dev/null; then
                git commit -m "📲 Add final batch [skip ci]" --quiet 2>/dev/null || true
                local PR=0
                while [ $PR -lt 5 ]; do
                  PR=$(( PR + 1 ))
                  if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                    echo "    ✅ Pushed!"; break
                  else
                    echo "    ⚠️  Retry $PR/5..."
                    sleep $(( 3 + RANDOM % 7 ))
                    git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                    git reset --hard origin/"$BRANCH" 2>/dev/null || true
                    mkdir -p downloads
                    cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                    for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done
                    if ! git diff --cached --quiet 2>/dev/null; then
                      git commit -m "📲 Add final batch [skip ci]" --quiet 2>/dev/null || true
                    fi
                  fi
                done
              fi
            fi
          }

          echo "🔄 Syncing with remote..."
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/

          ALL_FILES=()
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -name "README.md" -print0 2>/dev/null)
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -type f ! -name "README.md" -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          TOTAL_SIZE=0
          for F in "${ALL_FILES[@]}"; do
            [ -f "$F" ] || continue
            FS=$(stat -c%s "$F" 2>/dev/null || echo 0)
            TOTAL_SIZE=$(( TOTAL_SIZE + FS ))
          done
          TOTAL_SIZE_MB=$(( TOTAL_SIZE / 1024 / 1024 ))

          echo "📦 Files: $TOTAL_FILES — Size: ${TOTAL_SIZE_MB} MB"

          if [ $TOTAL_SIZE_MB -lt 100 ]; then
            echo "📤 Small upload — pushing all at once..."
            git add -A downloads/
            regenerate_master_readme
            git add downloads/README.md
            if ! git diff --cached --quiet; then
              git commit -m "📲 Telegram download [skip ci]"
              PR=0
              while [ $PR -lt 10 ]; do
                PR=$(( PR + 1 ))
                if timeout 300 git push origin HEAD:"$BRANCH"; then
                  echo "✅ Pushed!"; break
                else
                  echo "⚠️  Retry $PR/10..."
                  sleep $(( 3 + RANDOM % 7 ))
                  git fetch origin "$BRANCH"
                  git reset --hard origin/"$BRANCH"
                  mkdir -p downloads
                  cp -r "$BACKUP_DIR"/* downloads/
                  git add -A downloads/
                  regenerate_master_readme
                  git add downloads/README.md
                  if ! git diff --cached --quiet; then
                    git commit -m "📲 Telegram download [skip ci]"
                  fi
                fi
              done
            fi
          else
            echo "📤 Large upload — batch push..."
            push_batch "${ALL_FILES[@]}"

            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
            mkdir -p downloads
            cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
            regenerate_master_readme
            git add downloads/README.md
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "📋 Update downloads list [skip ci]" --quiet 2>/dev/null || true
              PR=0
              while [ $PR -lt 5 ]; do
                PR=$(( PR + 1 ))
                if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
                  echo "✅ README pushed!"; break
                else
                  echo "⚠️  Retry $PR/5..."; sleep 3
                fi
              done
            fi
          fi

          echo ""
          echo "🎉 Done! Files in: downloads/${{ env.folder_name }}/"

      - name: 📋 Final report
        if: always()
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│              📲 Telegram Downloader — Final Report          │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ 🔗 Source  : ${{ github.event.inputs.telegram_link }}"
          echo "│ 📁 Folder  : downloads/${{ env.folder_name }}/"
          if [ -n "${{ github.event.inputs.password }}" ]; then
            echo "│ 🔐 Archive : Password-protected"
          else
            echo "│ 🔓 Archive : No password"
          fi
          echo "└─────────────────────────────────────────────────────────────┘"
